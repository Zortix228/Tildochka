<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Tildochka</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
      text-align: center;
    }

    .container {
      display: none;
      padding: 20px;
    }

    h1 {
      font-size: 40px;
      margin-top: 40px;
    }

    .movies {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 40px;
    }

    .card {
      background: #1c1c1c;
      padding: 10px;
      border-radius: 10px;
      width: 200px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    .blocked {
      display: none;
      margin-top: 100px;
      font-size: 30px;
      color: red;
    }
  </style>
</head>
<body>

<div class="container" id="site">
  <h1>🎬 Tildochka</h1>

  <div class="movies">
    <div class="card">
      <img src="https://via.placeholder.com/200x300">
      <p>Мой сериал 1</p>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200x300">
      <p>Мой сериал 2</p>
    </div>
  </div>
</div>

<div class="blocked" id="blocked">
  ❌ Доступ запрещён
</div>

<script>
  let pass = prompt("Введите кодовое слово:");

  let valid = [
    "четыре курицы",
    "Четыре курицы",
    "4 курицы"
  ];

  if (valid.includes(pass)) {
    document.getElementById("site").style.display = "block";
  } else {
    document.getElementById("blocked").style.display = "block";
  }
</script>

</body>
</html>
