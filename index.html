<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Tildochka</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: white;
}

/* логотип */
.logo {
  position: absolute;
  top: 10px;
  left: 20px;
  font-size: 28px;
  font-weight: bold;
}

/* контейнер */
.container {
  margin-top: 80px;
  text-align: center;
}

/* сериал */
.video-box {
  margin-top: 20px;
}

button {
  margin: 5px;
  padding: 10px 15px;
  cursor: pointer;
}

/* отзывы */
.reviews {
  margin-top: 40px;
}

.review {
  border-top: 1px solid #ccc;
  padding: 10px;
}
</style>

<body>

<script>
let pass = prompt("Введите кодовое слово:");
let valid = ["четыре курицы","Четыре курицы","4 курицы"];

if (!valid.includes(pass)) {
  document.body.innerHTML = "<h1 style='text-align:center;margin-top:100px;'>❌ Доступ запрещён</h1>";
  throw new Error("Доступ запрещён"); // ОСТАНАВЛИВАЕТ ВСЁ
}
</script>

<div class="logo">Tildochka</div>

<div class="container">

<h1>Приключения 4 куриц</h1>

<p>⭐ Рейтинг: 9.5 / 10</p>

<p>Описание: Это история про 4 куриц, которые попадают в странные и смешные приключения...</p>

<!-- ВИДЕО -->
<video id="player" width="700" controls>
  <source src="episode1.mp4" type="video/mp4">
</video>

<br><br>

<button onclick="play('episode1.mp4')">Серия 1</button>
<button onclick="play('episode2.mp4')">Серия 2</button>
<button onclick="play('episode3.mp4')">Серия 3</button>
<button onclick="play('episode4.mp4')">Серия 4</button>

<script>
function play(src) {
  let player = document.getElementById("player");
  player.src = src;
  player.play();
}
</script>

<!-- СЕРИИ -->
<h3>Сезон 1</h3>

<button onclick="play('episode1.mp4')">Серия 1</button>

<button onclick="play('episode4.mp4')">Серия 4</button>

</div>

<script>

  let video = document.getElementById("player");

</html>
